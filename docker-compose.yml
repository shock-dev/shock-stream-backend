services:
  postgres:
    container_name: postgres
    image: postgres:16.0
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_NAME}
    healthcheck:
      test: [ "CMD-SHELL", "sh -c 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}'" ]
      interval: 10s
      timeout: 3s
      retries: 3
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - shock-stream_backend

  redis:
    container_name: redis
    image: redis:7.0
    restart: always
    ports:
      - "${REDIS_PORT}:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - shock-stream_backend


volumes:
  postgres_data:
  redis_data:

networks:
  shock-stream_backend:
